# Fault class: Dependency Failure — Pod Kill (SMF Internal Fault / PDU Session Churn Crash)
# Target: SMF — session management function; owns all PDU session lifecycle and PFCP associations
# Expected propagation: Application -> Orchestration -> Infrastructure
#   Infrastructure: SMF pod RSS drops to zero on kill; PFCP UDP socket (port 8805) disappears
#                   momentarily — UPF detects loss of N4 peer via missed heartbeats
#   Orchestration:  kube_pod_container_status_restarts_total{container="smf"} increments;
#                   if churn is induced rapidly (see note below), CrashLoopBackOff may appear;
#                   HPA cannot scale SMF during kill window (no metrics endpoint)
#   Application:    all active PFCP sessions become orphaned on UPF — UPF retains forwarding
#                   state but SMF loses session context; after restart SMF and UPF must
#                   re-synchronise (PFCP Session Report / re-establishment);
#                   AMF cannot create new PDU sessions during gap (N11 calls fail);
#                   UEs with active sessions see data-plane disruption matching the kill window
# Key signals: smf_pfcp_sessions_active drops to zero then recovers,
#              upf_pfcp_heartbeat_failures_total increments during SMF absence,
#              amf logs: "N11 SMF not reachable" during gap,
#              kube_pod_container_status_restarts_total{container="smf"} increments,
#              Loki gap in smf stream aligned with pod-kill window
# Fault model: Open5GS SMF crashes when a UE rapidly and repeatedly releases and
#              re-establishes PDU sessions — a state-machine fault in the SMF implementation.
#              Pod-kill directly reproduces the crash effect without requiring a UE driver.
#              See: https://github.com/open5gs/open5gs/issues/2309
# Source: Research excerpt provided (Open5GS SMF internal fault — PDU session churn crash)
#         Classified as "internal anomaly" / NF runtime fault in the referenced study.
#
# Apply:  kubectl apply -f 10-smf-internal-fault-pod-kill.yaml
# Remove: kubectl delete -f 10-smf-internal-fault-pod-kill.yaml
#
# Note: to increase crash probability, pair with a UERANSIM script that drives rapid
#       PDU session establishment → release cycles on multiple UEs concurrently.
#       The pod-kill here models the crash outcome; the UERANSIM script models the trigger.
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: smf-internal-fault-pod-kill
  namespace: open5gs
spec:
  action: pod-kill
  mode: all
  selector:
    namespaces:
      - open5gs
    labelSelectors:
      app.kubernetes.io/name: smf
      app.kubernetes.io/instance: open5gs
  duration: "1m"
