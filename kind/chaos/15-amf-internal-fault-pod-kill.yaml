# Fault class: Dependency Failure — Pod Kill (AMF Internal Fault / UE Context Race)
# Target: AMF — access and mobility management; handles all UE registrations and N2 signalling
# Expected propagation: Application -> Orchestration -> Infrastructure (inverse of typical)
#   Infrastructure: container_cpu_cfs_throttled_seconds_total drops to zero during pod absence;
#                   RSS/working-set drops to zero then spikes on restart (cold-start heap)
#   Orchestration:  K8s OOMKill or CrashLoopBackOff event depending on restart frequency;
#                   pod restart counter (kube_pod_container_status_restarts_total) increments;
#                   if crash loop is rapid, K8s backs off with exponential delay (up to 5 min)
#   Application:    all in-flight UE deregistration procedures fail mid-flight;
#                   SMF holds orphaned PDU sessions until N11 context cleanup timer fires;
#                   UEs attempting new registration during the gap receive no response on N1;
#                   NRF heartbeat from AMF stops — other NFs mark AMF instance as unavailable
# Key signals: amf_registered_ues_total drops to zero then recovers after restart,
#              smf_orphaned_sessions_total rises during AMF absence,
#              kube_pod_container_status_restarts_total{container="amf"} increments,
#              Loki gap in amf stream correlates exactly with pod-kill window
# Fault model: Open5GS AMF crashes during normal UE deregistration when a UE context
#              is released before a new registration round completes — a logic race in the
#              NF implementation. Pod-kill reproduces the crash directly.
#              See: https://github.com/open5gs/open5gs/issues/2308
# Source: Research excerpt provided (Open5GS AMF internal fault — deregistration context race)
#         Classified as "internal anomaly" / NF runtime fault in the referenced study.
#
# Apply:  kubectl apply -f 09-amf-internal-fault-pod-kill.yaml
# Remove: kubectl delete -f 09-amf-internal-fault-pod-kill.yaml
#
# Note: AMF will restart automatically via Kubernetes. The interesting window is the
#       gap between kill and successful restart + full NF re-registration with NRF.
#       Pair with load injection (e.g. UERANSIM UE attach storm) to make the race
#       condition more likely to reproduce in non-simulated scenarios.
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: amf-internal-fault-pod-kill
  namespace: open5gs
spec:
  action: pod-kill
  mode: all
  selector:
    namespaces:
      - open5gs
    labelSelectors:
      app.kubernetes.io/name: amf
      app.kubernetes.io/instance: open5gs
  duration: "1m"           # kill window; K8s restarts AMF immediately, so observe
                           # kube_pod_container_status_restarts_total and Loki gaps
