# Fault class: Network Partition — NF Spoofing / Rogue AMF Simulation
# Target: AMF — Access and Mobility Management Function
# Affected interface: SBI — AMF <-> SCP link (all AMF outbound/inbound SBI traffic)
# Expected propagation:
#   Infrastructure: no pod crash — AMF pod stays running
#   Orchestration:  K8s sees no crash; liveness probe may eventually fail
#   Application:    AMF cannot reach SCP → all UE registrations fail
#                   NRF, AUSF, UDM, SMF remain healthy and reachable
#                   UEs get no registration response → re-registration loop
# Key signals:
#   Metrics: AMF net_rx/net_tx drop to near zero (partitioned); others stable
#   Logs:    AMF logs connection errors; SCP logs dropped connections from AMF
#   Traces:  AMF span count drops to zero (no SBI calls complete)
# Cross-modal fingerprint: AMF goes dark in traces + metrics while all other NFs
#   remain healthy — distinct from NRF cascade (all NFs affected) and AUSF stress
#   (only auth chain affected). NRF/AUSF/UDM silence confirms AMF is isolated.
#
# Apply:  kubectl apply -f 22-network-partition-amf.yaml
# Remove: kubectl delete -f 22-network-partition-amf.yaml
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-partition-amf
  namespace: open5gs
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - open5gs
    labelSelectors:
      app.kubernetes.io/name: amf
      app.kubernetes.io/instance: open5gs
  direction: both
  target:
    mode: all
    selector:
      namespaces:
        - open5gs
      labelSelectors:
        app.kubernetes.io/name: scp
        app.kubernetes.io/instance: open5gs
  duration: "5m"
