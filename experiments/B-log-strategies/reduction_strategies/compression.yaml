promtail:
  config:
    snippets:
      pipelineStages:
        - docker: {}
        - regex:
            expression: "^(?P<nf_proc>[A-Z_]+) ?: ?(?P<var_data>.*)$"
        - replace:
            source: "var_data"
            expression: '([a-fA-F0-9]{10,}|[0-9]{10,})'
            replace: "<ID>"
        - template:
            source: "output"
            template: "{{ .nf_proc }}: {{ .var_data }}"
        - output:
            source: "output"
